# =============================================================================
# Bashabari self-hosted backend
# -----------------------------------------------------------------------------
# This compose file boots a minimal but production-grade Supabase stack:
#
#   db        - Postgres 15 with auth schema + the Bashabari schema preloaded
#   auth      - GoTrue: email/password + Google OAuth, issues JWTs
#   rest      - PostgREST: turns the DB into a REST API and enforces RLS
#   realtime  - Streams INSERT/UPDATE/DELETE from messages table to the browser
#   kong      - API gateway on :8000 — single entrypoint the frontend talks to
#   studio    - Admin web UI on :3000 (browse tables, run SQL)
#
# All services share the same network and read secrets from ../backend/.env
# Volumes are kept under ./volumes/ so you can wipe them with scripts/reset.sh
# =============================================================================

name: bashabari

services:
  # ---------------------------------------------------------------------------
  # Postgres — single source of truth.
  # The init scripts in volumes/db/ are auto-run the FIRST time the container
  # starts (when the data directory is empty). After that, use scripts/migrate.sh
  # to apply changes to an existing database.
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.6.1.139
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
      - ./volumes/db/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./volumes/db/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # GoTrue — handles signup, login, password reset, OAuth, JWT issuance.
  # The frontend's `supabase.auth.*` calls hit this through Kong.
  # ---------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_DISABLE_SIGNUP: "false"
      # Google OAuth (only enabled if both ID + secret are set)
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_CLIENT_ID:+true}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}

  # ---------------------------------------------------------------------------
  # PostgREST — exposes the public schema as a REST API.
  # Every request includes the user's JWT, which Postgres uses to enforce RLS.
  # ---------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ---------------------------------------------------------------------------
  # Realtime — websocket server that tails the WAL and pushes row changes
  # to subscribed clients. Used by the chat (messages table).
  # ---------------------------------------------------------------------------
  realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp

  # ---------------------------------------------------------------------------
  # Kong — single API gateway. The frontend ONLY talks to this on :8000.
  # It routes /auth/* → auth, /rest/* → rest, /realtime/* → realtime.
  # ---------------------------------------------------------------------------
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on: [auth, rest, realtime]
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./volumes/kong.yml:/var/lib/kong/kong.yml:ro

  # ---------------------------------------------------------------------------
  # Studio — Supabase's admin UI. Open http://localhost:3000 to browse tables,
  # run SQL, manage users, view RLS policies.
  # ---------------------------------------------------------------------------
  studio:
    image: supabase/studio:20240729-ce42139
    restart: unless-stopped
    depends_on: [kong]
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    environment:
      STUDIO_PG_META_URL: http://db:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Bashabari
      DEFAULT_PROJECT_NAME: Bashabari
      SUPABASE_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
